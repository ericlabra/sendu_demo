default: &default
  adapter: postgresql
  encoding: unicode

  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 5432 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "password" } %>

development:
  <<: *default
  database: sendu_demo_development

test:
  <<: *default
  database: sendu_demo_test

production:
  <<: *default
  database: sendu_demo_production
  username: sendu_demo
  password: <%= ENV['SENDU_DEMO_DATABASE_PASSWORD'] %>
