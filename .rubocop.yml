require:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  TargetRubyVersion: 2.7
  NewCops: enable
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'db/migrate/**/*'
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'log/**/*'
    - 'public/**/*'
    - 'coverage/**/*'

# Layout & Style
Layout/LineLength:
  Max: 120

Style/StringLiterals:
  EnforcedStyle: single_quotes

# Metrics
Metrics/BlockLength:
  Exclude:
    - 'spec/**/*'

Metrics/MethodLength:
  Exclude:
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 300

# RSpec rules
RSpec/ExampleLength:
  Max: 15

RSpec/MultipleExpectations:
  Max: 5